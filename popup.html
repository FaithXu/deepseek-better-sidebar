<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeepSeek 会话导航</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      min-height: 160px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8f9ff;
      color: #333;
      padding: 16px;
    }
    h1 {
      font-size: 15px;
      font-weight: 600;
      color: #4f46e5;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    h1::before {
      content: '';
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #6366f1;
      border-radius: 50%;
    }
    .info {
      font-size: 12px;
      color: #555;
      background: white;
      border-radius: 8px;
      padding: 10px 12px;
      line-height: 1.7;
      border: 1px solid #e5e7eb;
    }
    .info strong { color: #4f46e5; }
    .shortcut {
      margin-top: 10px;
      background: white;
      border-radius: 8px;
      padding: 10px 12px;
      border: 1px solid #e5e7eb;
    }
    .shortcut-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }
    kbd {
      background: #f1f1f1;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 11px;
      font-family: monospace;
      color: #333;
    }
    .tip {
      margin-top: 10px;
      font-size: 11px;
      color: #999;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>DeepSeek 会话导航</h1>
  <div class="info">
    在 DeepSeek 聊天页面，按 <strong>Alt + Shift + G</strong><br/>
    展开问题历史面板，一行显示完整内容。
  </div>
  <div class="shortcut">
    <div class="shortcut-row">
      <span>快捷键：</span>
      <kbd>Alt</kbd> + <kbd>Shift</kbd> + <kbd>G</kbd>
    </div>
  </div>
  <div class="tip">也可以直接点击扩展图标触发</div>
</body>
</html>
